

<style>

    .payment-wrapper{
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:70vh;
        background:#f4f6f9;
        padding:20px;
    }

    .payment-card{
        background:white;
        padding:35px;
        border-radius:15px;
        box-shadow:0 8px 25px rgba(0,0,0,0.08);
        width:400px;
        text-align:center;
    }

    .payment-title{
        font-size:22px;
        font-weight:600;
        margin-bottom:20px;
        color:#2c3e50;
    }

    .amount-box{
        background:#ecf9f1;
        padding:15px;
        border-radius:10px;
        margin-bottom:25px;
        font-size:18px;
        font-weight:600;
        color:#27ae60;
    }

    .pay-btn{
        width:100%;
        padding:12px;
        background:#2980b9;
        color:white;
        border:none;
        border-radius:8px;
        font-size:15px;
        cursor:pointer;
        transition:0.3s;
    }

    .pay-btn:hover{
        background:#21618c;
    }

    .secure-text{
        margin-top:12px;
        font-size:12px;
        color:gray;
    }

</style>

<div class="payment-wrapper">
    <div class="payment-card">

        <div class="payment-title">
            💳 Payment Page
        </div>

        <div class="amount-box">
            Total Amount: ₹ {{ total }}
        </div>

        <form method="POST" action="{% url 'confirm_payment' %}">
            {% csrf_token %}
            <button type="submit" class="pay-btn">
                🔐 Pay Now
            </button>
        </form>

        <div class="secure-text">
            🔒 Secure payment. Your data is protected.
        </div>

    </div>
</div>
