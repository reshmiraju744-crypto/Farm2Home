<!DOCTYPE html>
<html>
<head>
    <title>Delivery Details</title>

    <style>

        body{
            font-family:'Segoe UI', sans-serif;
            background:#f4f6f9;
            margin:0;
            padding:40px 0;
        }

        h2{
            text-align:center;
            margin-bottom:30px;
            color:#2c3e50;
        }

        .form-container{
            width:40%;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,0.08);
        }

        form p{
            margin-bottom:15px;
        }

        form input,
        form textarea,
        form select{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:14px;
        }

        form input:focus,
        form textarea:focus,
        form select:focus{
            outline:none;
            border-color:#27ae60;
        }

        .submit-btn{
            width:100%;
            padding:12px;
            background:#27ae60;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            margin-top:15px;
            transition:0.3s;
        }

        .submit-btn:hover{
            background:#219150;
        }

        .security-text{
            text-align:center;
            font-size:13px;
            color:gray;
            margin-top:10px;
        }

        @media(max-width:768px){
            .form-container{
                width:90%;
            }
        }

    </style>
</head>

<body>

<h2>🚚 Delivery Details</h2>

<div class="form-container">
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="submit-btn">
            🛒 Place Order
        </button>

        <div class="security-text">
            🔒 Your information is secure and protected.
        </div>
    </form>
</div>
{% include 'includes/footer.html' %}

</body>
</html>
