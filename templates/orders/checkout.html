<!DOCTYPE html>
<html>
<head>
    <title>Delivery Details</title>

    <style>

        body{
            font-family:'Segoe UI', sans-serif;
            background:#f4f6f9;
            margin:0;
            padding:40px 0;
        }

        h2{
            text-align:center;
            margin-bottom:30px;
            color:#2c3e50;
        }

        .form-container{
            width:40%;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,0.08);
        }

        .address-box{
            background:#f9f9f9;
            padding:15px;
            border-radius:8px;
            margin-bottom:20px;
            line-height:1.8;
        }

        .change-address{
            display:inline-block;
            margin-bottom:20px;
            color:#27ae60;
            text-decoration:none;
            font-weight:600;
        }

        .change-address:hover{
            text-decoration:underline;
        }

        .submit-btn{
            width:100%;
            padding:12px;
            background:#27ae60;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .submit-btn:hover{
            background:#219150;
        }

        .security-text{
            text-align:center;
            font-size:13px;
            color:gray;
            margin-top:10px;
        }

        @media(max-width:768px){
            .form-container{
                width:90%;
            }
        }

    </style>
</head>

<body>
<form method="POST">
    {% csrf_token %}

    <h3>Select Delivery Address</h3>

    {% for address in addresses %}
    <div class="address-box">

        <label>
            <input type="radio"
                   name="address_id"
                   value="{{ address.id }}"
                   {% if address.is_default %}checked{% endif %}>

            <strong>{{ address.label }}</strong><br>

{{ address.full_name }}<br>
{{ address.phone }}<br>
{{ address.address }}<br>
{{ address.city }} - {{ address.pincode }}

<br><br>

<a href="{% url 'edit_address' address.id %}"
   style="color:#27ae60;font-weight:bold;text-decoration:none;">
    ✏️ Edit Address
</a>
&nbsp;|&nbsp;

<a href="{% url 'delete_address' address.id %}"
   onclick="return confirm('Delete this address?')"
   style="color:red;text-decoration:none;font-weight:bold;">
    🗑 Delete
</a>
        </label>

    </div>
    {% empty %}
        <p>No address found.</p>
    {% endfor %}

    <a href="{% url 'save_address' %}" class="change-address">
        ➕ Add New Address
    </a>

    <button type="submit" class="submit-btn">
        🛒 Continue to Payment
    </button>

    <div class="security-text">
        🔒 Your information is secure and protected.
    </div>

</form>

{% include 'includes/footer.html' %}

</body>
</html>
