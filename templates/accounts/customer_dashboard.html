<!DOCTYPE html>
<html>
<head>
    <title>Customer Dashboard - FarmToHome</title>

    <style>
        body{
            margin:0;
            font-family:'Segoe UI', sans-serif;
            background:#f5f7f9;
        }

        /* Navbar */
        .navbar{
            background: #6B8E23;
            padding:12px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            color:white;
        }

        .logo{
            font-size:22px;
            font-weight:bold;
            text-decoration:none;
            color:white;
        }

        /* Dashboard Container */
        .dashboard-container{
            width:90%;
            margin:40px auto;
        }

        .dashboard-title{
            font-size:26px;
            margin-bottom:30px;
        }

        .dashboard-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:25px;
        }

        .dashboard-card{
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 6px 18px rgba(0,0,0,0.1);
            text-align:center;
            transition:0.3s;
        }

        .dashboard-card:hover{
            transform:translateY(-5px);
        }

        .dashboard-card a{
            text-decoration:none;
            color:#333;
            font-weight:bold;
            font-size:18px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="{% url 'product_list' %}" class="logo">
        🌿 FarmToHome
    </a>

    <div>
        <a href="{% url 'user_logout' %}" style="color:white;text-decoration:none;">
            Logout
        </a>
    </div>
</div>

<div class="dashboard-container">

    <div class="dashboard-title">
        Welcome {{ user.username }} 👋
    </div>

    <div class="dashboard-grid">

        <div class="dashboard-card">
            <a href="{% url 'product_list' %}">
                🛍 View Products
            </a>
        </div>

        <div class="dashboard-card">
            <a href="{% url 'order_history' %}">
                📦 My Orders
            </a>
        </div>

        <div class="dashboard-card">
            <a href="{% url 'view_cart' %}">
                🛒 My Cart
            </a>
        </div>

        <div class="dashboard-card">
            <a href="{% url 'wishlist' %}">
                ❤️ My Wishlist
            </a>
        </div>

        <div class="dashboard-card">
            <a href="{% url 'user_profile' %}">
                👤 My Profile
            </a>
        </div>

        <div class="dashboard-card">
            <a href="{% url 'edit_user' %}">
                ✏ Edit Profile
            </a>
        </div>

    </div>

</div>

{% include 'includes/footer.html' %}

</body>
</html>
