{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile - FarmToHome</title>

    <style>
        body{
            margin:0;
            font-family:'Segoe UI', sans-serif;
            background:#f5f7f9;
        }

        /* Navbar */
        .navbar{
            background: #6B8E23;
            padding:12px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            color:white;
        }

        .logo{
            font-size:22px;
            font-weight:bold;
            text-decoration:none;
            color:white;
        }

        .navbar a{
            color:white;
            text-decoration:none;
            margin-left:20px;
        }

        /* Form Container */
        .form-container{
            width:60%;
            margin:50px auto;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 6px 20px rgba(0,0,0,0.1);
        }

        .form-container h2{
            text-align:center;
            margin-bottom:30px;
        }

        .form-group{
            margin-bottom:20px;
        }

        .form-group label{
            display:block;
            margin-bottom:6px;
            font-weight:600;
        }

        .form-group input,
        .form-group textarea{
            width:100%;
            padding:10px;
            border-radius:8px;
            border:1px solid #ccc;
            font-size:14px;
        }

        textarea{
            resize:none;
        }

        .btn{
            display:block;
            width:100%;
            padding:12px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#218838;
        }

        @media(max-width:768px){
            .form-container{
                width:90%;
            }
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <a href="{% url 'product_list' %}" class="logo">🌿 FarmToHome</a>
    <div>
        <a href="{% url 'user_profile' %}">Profile</a>
        <a href="{% url 'user_logout' %}">Logout</a>
    </div>
</div>

<!-- Edit Profile Form -->
<div class="form-container">
    <h2>✏ Edit Profile</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label>First Name</label>
            <input type="text" name="first_name" value="{{ user.first_name }}">
        </div>

        <div class="form-group">
            <label>Last Name</label>
            <input type="text" name="last_name" value="{{ user.last_name }}">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ user.email }}">
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" value="{{ profile.phone }}">
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea name="address" rows="4">{{ profile.address }}</textarea>
        </div>

        <button type="submit" class="btn">💾 Save Changes</button>
    </form>
</div>

{% include 'includes/footer.html' %}

</body>
</html>
