
<style>
.wishlist-container {
    width: 90%;
    margin: 40px auto;
}

.wishlist-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
}

.wishlist-card {
     background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    text-align: center;
    min-height: 400px;   /* 🔥 Increased height (double size feel) */
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: 0.3s;
}

.wishlist-card:hover {
    transform: translateY(-5px);
}

.wishlist-card img {
     width: 100%;
    height: 300px;   /* 🔥 Bigger image */
     object-fit: contain;   /* 🔥 Show full image */
    background-color: #f8f9fa; /* Optional – nice background */
    border-radius: 8px;
}
}

.wishlist-card h5 {
    margin: 10px 0 5px;
}

.price {
    color: green;
    font-weight: bold;
}

.btn-group {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.btn {
    flex: 1;
    padding: 6px;
    border-radius: 6px;
    text-decoration: none;
    color: white;
    font-size: 14px;
}

.cart-btn {
    background: #28a745;
}

.remove-btn {
    background: #e63946;
}
.empty-msg {
    text-align: center;
    margin-top: 50px;
    font-size: 18px;
    color: #555;
}
</style>

<button onclick="history.back()" class="back-btn">
    ← Back
</button><h2 style="text-align:center;">❤️ My Wishlist</h2>

<div class="wishlist-container">

    {% if items %}
    <div class="wishlist-grid">

        {% for item in items %}
        <div class="wishlist-card">

            {% if item.product.image %}
                <img src="{{ item.product.image.url }}" alt="{{ item.product.name }}">
            {% else %}
                <img src="https://via.placeholder.com/300x160?text=No+Image">
            {% endif %}

            <h5>{{ item.product.name }}</h5>
            <p class="price">₹ {{ item.product.price }}</p>

            <div class="btn-group">
                <a href="{% url 'add_to_cart' item.product.id %}" class="btn cart-btn">
                    🛒 Add to Cart
                </a>

                <a href="{% url 'remove_from_wishlist' item.product.id %}" class="btn remove-btn">
                    Remove
                </a>
            </div>

        </div>
        {% endfor %}

    </div>

    {% else %}
        <p class="empty-msg">Your wishlist is empty 💔</p>
    {% endif %}

</div>

{% include 'includes/footer.html' %}
