<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile - FarmToHome</title>

    <style>
        body{
            font-family:'Segoe UI', sans-serif;
            background:#f5f7f9;
            margin:0;
            padding:40px;
        }

        .container{
            max-width:600px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#28a745;
        }

        label{
            font-weight:600;
            display:block;
            margin-top:15px;
            margin-bottom:5px;
        }

        input, textarea{
            width:100%;
            padding:10px;
            border-radius:8px;
            border:1px solid #ccc;
            font-size:14px;
            transition:0.3s;
        }

        input:focus, textarea:focus{
            border-color:#28a745;
            outline:none;
            box-shadow:0 0 5px rgba(40,167,69,0.3);
        }

        textarea{
            resize:none;
            height:80px;
        }

        .btn-group{
            margin-top:25px;
            text-align:center;
        }

        .save-btn{
            background:#28a745;
            color:white;
            padding:10px 20px;
            border:none;
            border-radius:8px;
            font-weight:600;
            cursor:pointer;
            margin-right:10px;
            transition:0.3s;
        }

        .save-btn:hover{
            background:#218838;
            transform:translateY(-2px);
        }

        .cancel-btn{
            background:#e74c3c;
            color:white;
            padding:10px 20px;
            border:none;
            border-radius:8px;
            text-decoration:none;
            font-weight:600;
            transition:0.3s;
        }

        .cancel-btn:hover{
            background:#c0392b;
            transform:translateY(-2px);
        }
<style>
.edit-container {
    width: 50%;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.edit-container h2 {
    text-align: center;
    margin-bottom: 20px;
}

.edit-container input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.edit-container button {
    width: 100%;
    padding: 10px;
    background-color: #28a745;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
}

.edit-container button:hover {
    background-color: #218838;
}
</style>

    </style>
</head>

<body>


<div class="edit-container">
    <h2>Edit Farmer Profile</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="farm_name"
               value="{{ farmer.farm_name }}"
               placeholder="Farm Name" required>

        <input type="text" name="farm_address"
               value="{{ farmer.farm_address }}"
               placeholder="Farm Address" required>

        <input type="text" name="village"
               value="{{ farmer.village }}"
               placeholder="Village" required>

        <input type="text" name="district"
               value="{{ farmer.district }}"
               placeholder="District" required>

        <button type="submit">Update Profile</button>
    </form>
</div>



</body>
</html>
