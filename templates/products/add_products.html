<!DOCTYPE html>
<html>
<head>
    <title>Add Product</title>

    <style>

        body{
            font-family:'Segoe UI', sans-serif;
            background:#f5f7f9;
            margin:0;
            padding:40px 0;
        }

        h2{
            text-align:center;
            margin-bottom:30px;
            color:#2c3e50;
        }

        .form-container{
            width:40%;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,0.08);
        }

        form p{
            margin-bottom:15px;
        }

        form input,
        form textarea,
        form select{
            width:100%;
            padding:8px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:14px;
        }

        form input:focus,
        form textarea:focus,
        form select:focus{
            outline:none;
            border-color:#27ae60;
        }

        .submit-btn{
            width:100%;
            padding:10px;
            background:#27ae60;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
            transition:0.3s;
        }

        .submit-btn:hover{
            background:#219150;
        }

        @media(max-width:768px){
            .form-container{
                width:90%;
            }
        }

    </style>
</head>
<body>

<h2>➕ Add Product</h2>

<div class="form-container">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <div style="display:flex; gap:10px; flex-direction:column;">
    <button type="submit" name="action" value="save" class="submit-btn">
        Save Product
    </button>

    <button type="submit" name="action" value="save_add" class="submit-btn" style="background:#3498db;">
        Save & Add Another
    </button>
</div>
    </form>
</div>

</body>
</html>
