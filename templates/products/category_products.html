<!DOCTYPE html>
{% load static %}
<html>
<head>
    <title>{{ category.name }} | FarmToHome</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background-color: #f8f9fa;
}

.header {
    background: #6B8E23;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 24px;
}

.product-section {
    width: 90%;
    margin: 40px auto;
}

.product-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
}

.product-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    text-align: center;
    min-height: 400px;   /* 🔥 Increased height (double size feel) */
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: 0.3s;
}

.product-card:hover {
    transform: translateY(-5px);
}

.product-card img {
    width: 100%;
    height: 300px;   /* 🔥 Bigger image */
     object-fit: contain;   /* 🔥 Show full image */
    background-color: #f8f9fa; /* Optional – nice background */
    border-radius: 8px;
}

.product-card a {
    text-decoration: none;
    color: #333;
}

.product-card a:hover {
    color: #28a745;
}

.price {
    color: green;
    font-weight: bold;
    margin: 15px 0;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="header">
    {{ category.name }}
</div>

<div class="product-section">
    <div class="product-grid">

        {% for product in products %}
        <div class="product-card">

            <a href="{% url 'product_detail' product.id %}">
                <img src="{{ product.image.url }}">
                <h3>{{ product.name }}</h3>
            </a>

            <p class="price">₹ {{ product.price }}</p>

        </div>
        {% empty %}
        <p>No products available in this category.</p>
        {% endfor %}

    </div>
</div>
{% include 'includes/footer.html' %}

</body>
</html>
